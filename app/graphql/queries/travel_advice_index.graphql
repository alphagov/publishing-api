query travel_advice_index($base_path: String!) {
  edition(base_path: $base_path) {
    ... on Edition {
      analytics_identifier
      base_path
      content_id
      description
      details {
        change_history
        email_signup_link
        max_cache_time
      }
      document_type
      first_published_at
      links {
        available_translations {
          analytics_identifier
          api_path
          api_url
          base_path
          content_id
          document_type
          locale
          public_updated_at
          schema_name
          title
          web_url
        }
        children {
          base_path
          details {
            change_description
            country
          }
          public_updated_at
          title
          web_url
        }
      }
      locale
      phase
      public_updated_at
      publishing_app
      publishing_request_id
      publishing_scheduled_at
      rendering_app
      scheduled_publishing_delay_seconds
      schema_name
      title
      updated_at
      withdrawn_notice {
        explanation
        withdrawn_at
      }
    }
  }
}
