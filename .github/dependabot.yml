version: 2
updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
    allow:
      - dependency-type: direct
    cooldown:
      default-days: 3
    open-pull-requests-limit: 25
    groups:
      test:
        patterns:
          - "*rspec"
          - "climate_control"
          - "database_cleaner"
          - "factory_bot*"
          - "govuk_test"
          - "pact*"
          - "*rspec"
          - "rspec-*"
          - "simplecov"
          - "stackprof"
          - "timecop"
          - "webmock"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 25

  # Ruby needs to be upgraded manually in multiple places, so cannot
  # be upgraded by Dependabot. That effectively makes the below
  # config redundant, as ruby is the only updatable thing in the
  # Dockerfile, although this may change in the future. We hope this
  # config will save a dev from trying to upgrade ruby via Dependabot.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
    ignore:
      - dependency-name: ruby
    cooldown:
      default-days: 7
    open-pull-requests-limit: 25
